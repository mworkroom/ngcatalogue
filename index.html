<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Catálogo de Produtos</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #6b7280;
      --line: #dfe3e8;
      --accent: #2c3e6b;
      --accent-soft: #eef1f8;
      --danger: #9b2c2c;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(21, 31, 52, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family:
        Inter, Pretendard, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }

    button, input { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .language-switch {
      display: inline-flex;
      padding: 4px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: var(--shadow);
    }

    .language-switch button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .language-switch button.active {
      color: white;
      background: var(--accent);
    }

    .search-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      height: 58px;
      padding: 0 20px 0 52px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow);
      font-size: 18px;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(44, 62, 107, 0.12);
    }

    .print-button {
      height: 58px;
      padding: 0 20px;
      border: 0;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 30px;
      margin: 0 2px 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-error {
      color: var(--danger);
      font-weight: 700;
    }

    .table-card {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      vertical-align: middle;
    }

    th:first-child,
    td:first-child {
      width: 46%;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #fafbfc; }

    .product-name {
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .set-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      vertical-align: 1px;
    }

    .mobile-list {
      display: none;
      gap: 10px;
    }

    details.product-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    details.product-card summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      list-style: none;
    }

    details.product-card summary::-webkit-details-marker { display: none; }

    .summary-name {
      min-width: 0;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .summary-price {
      flex: 0 0 auto;
      color: var(--accent);
      font-weight: 800;
    }

    .card-details {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
      border-top: 1px solid var(--line);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-top: 12px;
    }

    .detail-label { color: var(--muted); }
    .detail-value { font-weight: 750; text-align: right; }

    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 24px, 680px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
      }

      .search-panel {
        grid-template-columns: 1fr;
      }

      .print-button {
        display: none;
      }

      .table-card {
        display: none;
      }

      .mobile-list {
        display: grid;
      }

      .meta {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 7mm;
      }

      body {
        background: white;
        font-size: 10pt;
      }

      .app {
        width: 100%;
        padding: 0;
      }

      .topbar,
      .search-panel,
      .meta,
      .mobile-list {
        display: none !important;
      }

      .table-card {
        display: block !important;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      th, td {
        padding: 4px 6px;
        border-color: #aaa;
      }

      th {
        position: static;
        background: white;
        color: black;
      }

      tbody tr {
        break-inside: avoid;
      }

      .set-badge {
        border: 1px solid #888;
        background: white;
        color: black;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 id="pageTitle">Catálogo de Produtos</h1>

      <div class="language-switch" aria-label="Language">
        <button type="button" id="ptButton" class="active">PT</button>
        <button type="button" id="koButton">한국어</button>
      </div>
    </header>

    <section class="search-panel">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          id="searchInput"
          type="search"
          autocomplete="off"
          placeholder="Pesquisar produto"
          aria-label="Pesquisar produto"
        />
      </div>
      <button type="button" class="print-button" id="printButton">Imprimir PDF</button>
    </section>

    <div class="meta">
      <span id="resultCount">Carregando…</span>
      <span id="statusText"></span>
    </div>

    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th id="nameHeader">Produto</th>
            <th id="businessHeader">Distribuidor</th>
            <th id="consumerHeader">Consumidor</th>
            <th id="brazilHeader">Site</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="tableEmpty" class="empty" hidden>Nenhum produto encontrado.</div>
    </section>

    <section id="mobileList" class="mobile-list"></section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    /*
      1) 아래 두 값을 새 Supabase 프로젝트의 값으로 교체하세요.
      2) service_role/secret key가 아니라 Publishable key 또는 legacy anon key를 사용하세요.
    */
    const SUPABASE_URL = "https://jnyfiggkmbjuiebvbsdk.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_eOBdwbvPo6T3xPV-8fg-mQ_KqpAfs_Y";

    /*
      사업자용 공개 View 이름입니다.
      이 페이지는 catalog_products 원본 테이블을 직접 읽지 않습니다.
    */
    const PUBLIC_VIEW = "catalog_public_products";

    const supabase = createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY
    );

    const dictionary = {
      pt: {
        locale: "pt-BR",
        title: "Catálogo de Produtos",
        search: "Pesquisar produto",
        print: "Imprimir PDF",
        name: "Produto",
        business: "Distribuidor",
        consumer: "Consumidor",
        brazil: "Site",
        set: "Conjunto",
        empty: "Nenhum produto encontrado.",
        loading: "Carregando…",
        count: (n) => `${n} produto${n === 1 ? "" : "s"}`,
        setup:
          "Configure SUPABASE_URL e SUPABASE_PUBLISHABLE_KEY no arquivo.",
        loadError: "Não foi possível carregar os produtos."
      },
      ko: {
        locale: "ko-KR",
        title: "브라질 가격표",
        search: "상품명 검색",
        print: "PDF 출력",
        name: "상품명",
        business: "사업자",
        consumer: "소비자",
        brazil: "사이트",
        set: "세트",
        empty: "검색 결과가 없습니다.",
        loading: "불러오는 중…",
        count: (n) => `상품 ${n}개`,
        setup: "파일 안의 Supabase URL과 Publishable Key를 입력해 주세요.",
        loadError: "상품을 불러오지 못했습니다."
      }
    };

    const state = {
      language: "pt",
      products: [],
      query: ""
    };

    const elements = {
      pageTitle: document.querySelector("#pageTitle"),
      ptButton: document.querySelector("#ptButton"),
      koButton: document.querySelector("#koButton"),
      searchInput: document.querySelector("#searchInput"),
      printButton: document.querySelector("#printButton"),
      resultCount: document.querySelector("#resultCount"),
      statusText: document.querySelector("#statusText"),
      tableBody: document.querySelector("#tableBody"),
      tableEmpty: document.querySelector("#tableEmpty"),
      mobileList: document.querySelector("#mobileList"),
      nameHeader: document.querySelector("#nameHeader"),
      businessHeader: document.querySelector("#businessHeader"),
      consumerHeader: document.querySelector("#consumerHeader"),
      brazilHeader: document.querySelector("#brazilHeader")
    };

    function isConfigured() {
      return (
        !SUPABASE_URL.includes("YOUR_PROJECT_REF") &&
        !SUPABASE_PUBLISHABLE_KEY.includes("YOUR_SUPABASE")
      );
    }

    function normalizeText(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "")
        .toLocaleLowerCase();
    }

    function displayName(product) {
      if (state.language === "pt") {
        return product.name_pt?.trim() || product.name_ko?.trim() || "";
      }
      return product.name_ko?.trim() || product.name_pt?.trim() || "";
    }

    function formatPrice(value) {
      if (value === null || value === undefined || value === "") return "—";

      const number = Number(value);
      if (!Number.isFinite(number)) return String(value);

      if (state.language === "pt") {
        return new Intl.NumberFormat("pt-BR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        }).format(number);
      }

      return new Intl.NumberFormat("ko-KR", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      }).format(number);
    }

    function filteredProducts() {
      const query = normalizeText(state.query);

      const filtered = state.products.filter((product) => {
        if (!query) return true;

        return (
          normalizeText(product.name_pt).includes(query) ||
          normalizeText(product.name_ko).includes(query)
        );
      });

      return filtered.sort((a, b) => {
        /*
          검색 결과에서는 세트 우선.
          전체 목록에서는 이름순으로만 정렬.
        */
        if (query && Boolean(a.is_set) !== Boolean(b.is_set)) {
          return a.is_set ? -1 : 1;
        }

        return displayName(a).localeCompare(
          displayName(b),
          dictionary[state.language].locale,
          { sensitivity: "base", numeric: true }
        );
      });
    }

    function setLanguage(language) {
      state.language = language;
      document.documentElement.lang = language === "pt" ? "pt-BR" : "ko";
      elements.ptButton.classList.toggle("active", language === "pt");
      elements.koButton.classList.toggle("active", language === "ko");
      renderStaticText();
      renderProducts();
    }

    function renderStaticText() {
      const t = dictionary[state.language];

      document.title = t.title;
      elements.pageTitle.textContent = t.title;
      elements.searchInput.placeholder = t.search;
      elements.searchInput.setAttribute("aria-label", t.search);
      elements.printButton.textContent = t.print;
      elements.nameHeader.textContent = t.name;
      elements.businessHeader.textContent = t.business;
      elements.consumerHeader.textContent = t.consumer;
      elements.brazilHeader.textContent = t.brazil;
      elements.tableEmpty.textContent = t.empty;
    }

    function createSetBadge(product) {
      if (!product.is_set) return "";

      return `<span class="set-badge">${dictionary[state.language].set}</span>`;
    }

    function renderDesktopRows(products) {
      elements.tableBody.innerHTML = products
        .map(
          (product) => `
            <tr>
              <td>
                <span class="product-name">${escapeHtml(displayName(product))}</span>
                ${createSetBadge(product)}
              </td>
              <td>${escapeHtml(formatPrice(product.business_price))}</td>
              <td>${escapeHtml(formatPrice(product.consumer_price))}</td>
              <td>${escapeHtml(formatPrice(product.brazil_price))}</td>
            </tr>
          `
        )
        .join("");
    }

    function renderMobileCards(products) {
      const t = dictionary[state.language];

      elements.mobileList.innerHTML = products
        .map(
          (product) => `
            <details class="product-card">
              <summary>
                <span class="summary-name">
                  ${escapeHtml(displayName(product))}
                  ${createSetBadge(product)}
                </span>
                <span class="summary-price">
                  ${escapeHtml(formatPrice(product.business_price))}
                </span>
              </summary>
              <div class="card-details">
                <div class="detail-row">
                  <span class="detail-label">${t.business}</span>
                  <span class="detail-value">${escapeHtml(formatPrice(product.business_price))}</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">${t.consumer}</span>
                  <span class="detail-value">${escapeHtml(formatPrice(product.consumer_price))}</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">${t.brazil}</span>
                  <span class="detail-value">${escapeHtml(formatPrice(product.brazil_price))}</span>
                </div>
              </div>
            </details>
          `
        )
        .join("");
    }

    function renderProducts() {
      const products = filteredProducts();
      const t = dictionary[state.language];

      elements.resultCount.textContent = t.count(products.length);
      elements.tableEmpty.hidden = products.length > 0;

      if (products.length === 0) {
        elements.tableBody.innerHTML = "";
        elements.mobileList.innerHTML = `<div class="empty">${t.empty}</div>`;
        return;
      }

      renderDesktopRows(products);
      renderMobileCards(products);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadProducts() {
      const t = dictionary[state.language];
      elements.resultCount.textContent = t.loading;
      elements.statusText.textContent = "";
      elements.statusText.classList.remove("status-error");

      if (!isConfigured()) {
        elements.resultCount.textContent = "0";
        elements.statusText.textContent = t.setup;
        elements.statusText.classList.add("status-error");
        return;
      }

      const { data, error } = await supabase
        .from(PUBLIC_VIEW)
        .select(`
          id,
          name_ko,
          name_pt,
          business_price,
          consumer_price,
          brazil_price,
          is_set
        `);

      if (error) {
        console.error(error);
        elements.resultCount.textContent = "0";
        elements.statusText.textContent = `${t.loadError} (${error.message})`;
        elements.statusText.classList.add("status-error");
        return;
      }

      state.products = Array.isArray(data) ? data : [];
      renderProducts();
    }

    elements.ptButton.addEventListener("click", () => setLanguage("pt"));
    elements.koButton.addEventListener("click", () => setLanguage("ko"));

    elements.searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderProducts();
    });

    elements.printButton.addEventListener("click", () => window.print());

    renderStaticText();
    loadProducts();
  </script>
</body>
</html>
